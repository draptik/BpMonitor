name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Run markdownlint-cli2
        run: npx markdownlint-cli2 "**/*.md"

  lint-shell:
    name: Lint Shell
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Run shellcheck
        run: find . -name "*.sh" -not -path "./.husky/_/*" | xargs shellcheck

  lint-fsharp:
    name: Lint F#
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore tools
        run: dotnet tool restore
        working-directory: code

      - name: Check formatting
        run: dotnet fantomas --check .
        working-directory: code

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore
        working-directory: code

      - name: Build
        run: dotnet build --no-restore --configuration Release
        working-directory: code

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./TestResults
        working-directory: code

      - name: Generate coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: "code/TestResults/**/coverage.cobertura.xml"
          targetdir: "code/CoverageReport"
          reporttypes: "MarkdownSummaryGithub;Badges"

      - name: Write coverage to job summary
        run: cat code/CoverageReport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Post coverage comment on PR
        uses: marocchino/sticky-pull-request-comment@v3
        if: github.event_name == 'pull_request'
        with:
          path: code/CoverageReport/SummaryGithub.md

      - name: Push coverage badge to badges branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          if git fetch origin badges:badges 2>/dev/null; then
            git checkout badges
          else
            git checkout --orphan badges
            git rm -rf . 2>/dev/null || true
          fi
          cp code/CoverageReport/badge_linecoverage.svg coverage.svg
          git add coverage.svg
          git diff --cached --quiet || git commit -m "chore: update coverage badge"
          git push origin badges --force

  publish-single-executable:
    name: Publish Single Executable
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Publish single executable
        run: >
          dotnet publish BpMonitor.Tui/BpMonitor.Tui.fsproj
          --configuration Release
          --runtime linux-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=none
          --output ./publish
        working-directory: code

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bpmonitor-linux-x64
          path: code/publish/
