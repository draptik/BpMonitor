name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Publish single executable
        run: >
          dotnet publish BpMonitor.Tui/BpMonitor.Tui.fsproj
          --configuration Release
          --runtime linux-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=none
          --output ./publish
        working-directory: code

      - name: Rename binary
        run: mv code/publish/BpMonitor.Tui code/publish/bpmonitor

      - name: Publish web single executable
        run: >
          dotnet publish BpMonitor.Web/BpMonitor.Web.fsproj
          --configuration Release
          --runtime linux-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=none
          --output ./publish-web
        working-directory: code

      - name: Rename web binary
        run: mv code/publish-web/BpMonitor.Web code/publish-web/bpmonitor-web

      - name: Package web bundle
        run: >
          tar -czf code/bpmonitor-web-linux-x64.tar.gz
          -C code/publish-web bpmonitor-web appsettings.json wwwroot

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            code/publish/bpmonitor
            code/publish/appsettings.json
            code/bpmonitor-web-linux-x64.tar.gz
          generate_release_notes: true
          # Treat tags carrying a pre-release suffix (e.g. v0.1.11-rc1) as
          # prereleases so the /releases/latest API keeps pointing at the last
          # stable release that install.sh and the docs depend on.
          prerelease: ${{ contains(github.ref_name, '-') }}

  publish-image:
    name: Publish container image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/draptik/bpmonitor-web
          # {{version}} strips the leading "v"; latest=auto adds :latest only
          # for stable (non-pre-release) semver tags.
          tags: |
            type=semver,pattern={{version}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: code
          file: code/BpMonitor.Web/Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
