[tools]
node = "26.3.1"
biome = "2.4.16"
markdownlint-cli2 = "0.22.1"
shellcheck = "0.11.0"

[tasks."lint:md"]
run = 'markdownlint-cli2 "**/*.md"'

[tasks."lint:js"]
run = "biome check"

[tasks."lint:shell"]
# mirror the CI/hook exclusion of Husky's generated wrapper scripts
run = 'find . -name "*.sh" -not -path "./.husky/_/*" | xargs -r shellcheck'

[tasks.lint]
depends = ["lint:md", "lint:js", "lint:shell"]
